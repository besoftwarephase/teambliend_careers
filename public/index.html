<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliend - Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

/* ─── BASE ─────────────────────────────────────────────── */
html, body {
  width: 100%;
  max-width: 100%;
  height: 100%;
  overflow-x: hidden;
}

body {
  background: #1A1A1A;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 40px 16px;
  position: relative;
}

/*------ UNSUPPORTED BROWSER ---------*/
#unsupported_browser_banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 99999;
  background: #1a1a1a;
  border-bottom: 1px solid #f5f5f530;
  padding: 12px 20px;
  box-sizing: border-box;
  align-items: center;
  justify-content: space-between;
  font-family: 'inter', sans-serif;
  font-size: 12px;
  color: #888888cc;
  gap: 12px;
  min-height: 100vh;
}

#unsupported_browser_banner .ub-message {
  display: flex !important;
  align-items: center;
  gap: 10px;
  flex: 1;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(100% - 80px);
  max-width: 560px;
}

#unsupported_browser_banner .ub-icon {
  width: 65px;
  height: 65px;
  flex-shrink: 0;
  fill: none;
  stroke: #f5a623;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

#unsupported_browser_banner .ub-text {
  color: #888888cc;
  line-height: 1.5;
  font-size: 14px;
  margin-left: 22px;
}

#unsupported_browser_banner .ub-text a {
  color: #f5f5f5b8;
  text-decoration: underline;
  text-underline-offset: 2px;
}

#unsupported_browser_banner .ub-text a:hover {
  color: #ffffff;
}

#unsupported_browser_banner .ub-close {
  cursor: pointer;
  color: #f5f5f5b8;
  font-size: 20px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  background: transparent;
  border: none;
  flex-shrink: 0;
  transition: background 0.15s;
  position: absolute;
  right: 9px;
  top: 12px;
}

#unsupported_browser_banner .ub-close:hover {
  background: #ffffff15;
  color: #ffffff;
}

/* ─── MAIN CONTENT ──────────────────────────────────────── */
.main_content {
  width: 100%;
  max-width: 560px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ─── HERO ──────────────────────────────────────────────── */
.hero {
  text-align: center;
  margin-bottom: -4px;
  width: 100%;
}

#logo {
  max-width: min(260px, 70vw);
  height: auto;
  display: block;
  margin: 0 auto;
}

.hero p {
  margin-top: 17px;
  color: #6b7280;
  font-size: clamp(10px, 2.5vw, 12px);
  margin-bottom: 36px;
  padding: 0 8px;
  line-height: 1.6;
}

.hero p:hover {
  color: #ffffff87;
  font-weight: 400;
  transition: all .25s ease;
}

/* ─── CONTAINER ─────────────────────────────────────────── */
.container {
  background: #333232;
  padding: 5px;
  border-radius: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.35);
  width: 100%;
}

/* ─── CARD ──────────────────────────────────────────────── */
.card {
  width: 100%;
  padding: clamp(20px, 5vw, 30px) clamp(18px, 7vw, 40px) clamp(52px, 8vw, 35px);
  border-radius: 25px;
  text-align: center;
  color: white;
  position: relative;
  background: linear-gradient(76deg, #252425 0%, #636363 100%);
  box-shadow:
    0 8px 30px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

.card h2 {
  font-size: clamp(18px, 5vw, 32px);
  font-weight: 400;
  margin-bottom: 10px;
  color: #ffffffd4;
}

.card > p {
  opacity: .9;
  margin-bottom: 16px;
  font-size: clamp(11px, 2.5vw, 12px);
  color: #d6d9de8c;
  line-height: 17px;
  font-weight: 200;
}

/* ─── INPUT BOX ─────────────────────────────────────────── */
.input-box {
  width: min(350px, 100%);
  margin: auto;
}

/* ─── INPUT WRAP (anchors arrow independently of errorMsg) ─ */
.input-wrap {
  position: relative;
  width: 100%;
}

.input-wrap input {
  width: 100%;
  padding: 14px 60px 14px 25px;
  border-radius: 40px;
  border: 2px solid transparent;
  outline: none;
  font-size: clamp(11px, 2.5vw, 12px);
  background: rgba(255,255,255,0.25);
  color: white;
  backdrop-filter: blur(10px);
  transition: all .25s ease;
  font-weight: 200;
}

.input-wrap input::placeholder {
  color: #ffffff9e;
}

#email:focus {
  border: 2px solid #2563eb;
  box-shadow:
    0 0 0 2px rgba(50,118,180,0.2),
    0 6px 16px rgba(0,0,0,0.25);
  background: #FFFFFF;
  color: #333232;
  font-weight: 500;
}

/* ─── ARROW BUTTON ──────────────────────────────────────── */
.arrow {
  position: absolute;
  right: 5px;
  top: 6px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: #2563eb;
  cursor: pointer;
  padding: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s ease;
}

.arrow:hover {
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
  transform: scale(1.08);
}

/* ─── ERROR MESSAGE ─────────────────────────────────────── */
#errorMsg {
  color: #e45153;
  font-size: 11px;
  margin-top: 6px;
  min-height: 18px;
  font-weight: 400;
  text-align: center;
}

/* ─── AVATARS (overlapping arc) ─────────────────────────── */
.avatars {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.avatars img {
  border-radius: 50%;
  object-fit: cover;
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  flex-shrink: 0;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  position: relative;
}

.avatars img:hover {
  transform: scale(1.2) translateY(-4px) !important;
  box-shadow: rgba(100,100,111,0.35) 0px 7px 29px 0px;
  z-index: 10 !important;
}

/* Desktop avatar sizes */
.av1 { width: 40px; height: 40px; border: 3px solid #4c4d4fd6; margin-bottom: 8px; margin-right: -14px; z-index: 1; }
.av2 { width: 50px; height: 50px; border: 3px solid #4c4d4fd6; margin-bottom: 4px; margin-right: -16px; z-index: 3; }
.av3 { width: 62px; height: 62px; border: 3px solid #4c4d4fd6; z-index: 7; }
.av4 { width: 50px; height: 50px; border: 3px solid #4c4d4fd6; margin-bottom: 4px; margin-left: -16px; z-index: 3; }
.av5 { width: 40px; height: 40px; border: 3px solid #4c4d4fd6; margin-bottom: 8px; margin-left: -14px; z-index: 1; }

/* ─── FOOTER ────────────────────────────────────────────── */
.footer {
  position: fixed;
  bottom: 2% !important;
  left: 0;
  right: 0;
  text-align: center;
  font-size: clamp(8px, 2vw, 9px);
  color: #ffffff94;
  font-weight: 100;
}

.footer strong {
  color: #e5e7ebb8;
}

.footer:hover {
  text-decoration: underline;
  text-decoration-color: #4383ba;
  transition: all 0.3s ease;
  text-underline-offset: 4px;
}

/* ════════════════════════════════════════════════════════
   TABLET  480px – 768px
════════════════════════════════════════════════════════ */
@media (min-width: 480px) and (max-width: 768px) {
  body {
    padding: 36px 24px;
  }

  .main_content {
    max-width: 480px;
  }

  .hero {
    margin-bottom: 28px;
  }

  .card {
    padding: 24px 28px 56px;
  }

  .av1 { width: 36px; height: 36px; margin-right: -12px; margin-bottom: 7px; }
  .av2 { width: 46px; height: 46px; margin-right: -14px; margin-bottom: 3px; }
  .av3 { width: 56px; height: 56px; }
  .av4 { width: 46px; height: 46px; margin-left: -14px; margin-bottom: 3px; }
  .av5 { width: 36px; height: 36px; margin-left: -12px; margin-bottom: 7px; }

  .avatars {
    bottom: -22px;
  }

  #unsupported_browser_banner .ub-message {
    display: flex;
    width: calc(100% - 60px);
  }

  #unsupported_browser_banner .ub-text {
    font-size: 12px !important;
  }
}

/* ════════════════════════════════════════════════════════
   MOBILE  <= 479px
════════════════════════════════════════════════════════ */
@media (max-width: 479px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 14px 50px;
    min-height: 100vh;
  }

  .main_content {
    position: relative;
    top: auto;
    left: auto;
    transform: none;
    max-width: 100%;
    width: 100%;
  }

  .hero {
    margin-bottom: 22px;
  }

  #logo {
    max-width: 190px;
  }

  .hero p {
    margin-bottom: 24px;
  }

  .container {
    border-radius: 22px;
    margin: auto;
    width: 95%;
  }

  .card {
    border-radius: 18px;
    padding: 20px 16px 35px;
  }

  .card h2 {
    font-size: 17px;
  }

  .input-wrap input {
    padding: 13px 40px 13px 17px;
    font-size: 11px;
  }

  .arrow {
    width: 28px;
    height: 28px;
    top: 8px;
  }

  .av1 { width: 30px; height: 30px; border-width: 2px; margin-right: -10px; margin-bottom: 6px; display: none; }
  .av2 { width: 38px; height: 38px; border-width: 2px; margin-right: -12px; margin-bottom: 2px; }
  .av3 { width: 48px; height: 48px; border-width: 2px; }
  .av4 { width: 38px; height: 38px; border-width: 2px; margin-left: -12px; margin-bottom: 2px; }
  .av5 { width: 30px; height: 30px; border-width: 2px; margin-left: -10px; margin-bottom: 6px; display: none; }

  .avatars {
    bottom: -18px;
  }

  .footer {
    bottom: 2% !important;
  }

  #unsupported_browser_banner .ub-icon {
    width: 44px;
    height: 44px;
  }

  #unsupported_browser_banner .ub-message {
    display: flex;
    width: calc(100% - 50px);
    gap: 8px;
  }

  #unsupported_browser_banner .ub-text {
    font-size: 11px !important;
    margin-left: 10px;
  }
}

/* ════════════════════════════════════════════════════════
   SHORT VIEWPORTS (landscape phones, small tablets)
════════════════════════════════════════════════════════ */
@media (max-height: 500px) {
  .main_content {
    position: relative;
    top: auto;
    left: auto;
    transform: none;
    margin: auto;
    padding: 16px 0;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow-y: auto;
  }

  .hero p {
    margin-bottom: 16px;
  }

  .footer {
    position: static;
    margin-top: 12px;
    padding-bottom: 4px;
  }
}

/* ════════════════════════════════════════════════════════
   LARGE DESKTOP  >= 1200px
════════════════════════════════════════════════════════ */
@media (min-width: 1200px) {
  .main_content {
    max-width: 580px;
  }
}
</style>
</head>

<body>
<!-- ─── Unsupported Browser Banner ─── -->
<div id="unsupported_browser_banner">
  <div class="ub-message">
    <svg class="ub-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span class="ub-text">
      Your browser is outdated and may not display this page correctly.
      Please upgrade to
      <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Chrome</a>,
      <a href="https://www.mozilla.org/firefox/" target="_blank" rel="noopener">Firefox</a>, or
      <a href="https://www.microsoft.com/edge" target="_blank" rel="noopener">Microsoft Edge</a>
      for the best experience.
    </span>
  </div>
  <button class="ub-close" onclick="document.getElementById('unsupported_browser_banner').style.display='none'" title="Dismiss">&times;</button>
</div>
<!-- ─── End Unsupported Browser Banner ─── -->

<div class="main_content">

  <!-- HERO -->
  <div class="hero">
    <h1><img src="images/Bliend_w_logo_header.svg" alt="Bliend_logo" id="logo"></h1>
    <p>Experience. Explore. Evolve</p>
  </div>

  <!-- LOGIN CARD -->
  <div class="container">
    <div class="card">

      <h2>#Bliendtalents</h2>
      <p>Let your unseen become undeniable.</p>

      <div class="input-box">
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            placeholder="youremail@address.com"
            required
            autocomplete="off"
          />
          <button class="arrow" id="submit" aria-label="Submit email">
            <img src="images/down-arrow.svg"
                 alt="Submit button"
                 style="width:12px;height:12px;transform:rotate(358deg);margin-left: 4px;">
          </button>
        </div>
        <p id="errorMsg"></p>
      </div>

      <!-- OVERLAPPING AVATARS -->
      <div class="avatars">
        <img src="images/image_1.jpg"      alt="Bliend Team member" class="av1" id="av1">
        <img src="images/image_2_2.jpg"    alt="Bliend Team member" class="av2" id="av2">
        <img src="images/center_image.jpg" alt="Bliend Team member" class="av3" id="av3">
        <img src="images/image_4.jpg"      alt="Bliend Team member" class="av4" id="av4">
        <img src="images/image_5_1.jpg"    alt="Bliend Team member" class="av5" id="av5">
      </div>

    </div>
  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  © 2026 Powered by <strong>Bliend</strong>. All Rights Reserved
</footer>

<script>
const emailInput = document.getElementById("email");
const submitBtn = document.getElementById("submit");
const errorMsg = document.getElementById("errorMsg");

// Email regex
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// ----------------------
// SUBMIT VALIDATION
// ----------------------
submitBtn.addEventListener("click", function(e){
  e.preventDefault();
  const email = emailInput.value.trim();
  if(email === ""){
    errorMsg.textContent = "Email field cannot be empty";
    emailInput.style.border = "2px solid #e45153";
    emailInput.focus();
    return;
  }
  if(!emailRegex.test(email)){
    errorMsg.textContent = "Please enter a valid email address";
    emailInput.style.border = "2px solid #e45153";
    emailInput.focus();
    return;
  }
  localStorage.setItem("userEmail", email);
  errorMsg.style.color = "green";
  errorMsg.textContent = "Email stored successfully!";
  emailInput.style.border = "2px solid green";
  window.location.href = "career.html";
});

// ----------------------
// REMOVE ERROR WHILE TYPING
// ----------------------
emailInput.addEventListener("input", function(){
  const value = emailInput.value.trim();
  if(value !== ""){
    errorMsg.textContent = "";
    emailInput.style.border = "2px solid #3276b4";
  }
});

// ----------------------
// VALIDATE ON BLUR
// ----------------------
emailInput.addEventListener("blur", function(){
  const email = emailInput.value.trim();
  if(email === ""){
    errorMsg.textContent = "";
    emailInput.style.border = "2px solid transparent";
    return;
  }
  if(!emailRegex.test(email)){
    errorMsg.textContent = "Please enter a valid email address";
     emailInput.style.border = "2px solid transparent";
  } else {
    errorMsg.textContent = "";
     emailInput.style.border = "2px solid transparent";
  }
});
</script>
</body>
</html>
